spring:
  datasource:
    url: jdbc:postgresql://postgres-accounts:5432/accounts_db
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false

customers:
  service:
    url: http://ms-customers:8081